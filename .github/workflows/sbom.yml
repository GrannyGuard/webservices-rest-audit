name: SBOM & SCA - Software Composition Analysis

# Generates a CycloneDX SBOM and immediately scans it with OSV-Scanner.
# Combined into a single job (was two workflows linked via workflow_run +
# artifact upload/download) so the scanner always sees the SBOM that was
# just built for *this* commit/branch — no stale-artifact or cross-workflow
# trigger gotchas (workflow_run resolves the workflow file from the default
# branch, which made PR-branch runs use a possibly-outdated sca.yml).

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sbom-sca-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  sbom-sca:
    name: Generate SBOM & Scan for Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Pinned plugin version so the SBOM generator itself is reproducible
      # and not silently upgraded to an untrusted/newer release on every run.
      - name: Generate SBOM with CycloneDX Maven plugin
        run: mvn -B -ntp org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom -DoutputFormat=json

      - name: Move SBOM to docs/
        run: |
          mkdir -p docs sbom
          cp target/bom.json docs/security/03-sbom-en-cve-advies/sbom.cdx.json
          cp target/bom.json sbom/sbom.cdx.json

      # ── Upload as CI artifact ──
      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: docs/security/03-sbom-en-cve-advies/sbom.cdx.json
          retention-days: 90

      # ── OSV-Scanner: scans the CycloneDX SBOM against the OSV database ──
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@daa2c68f50d845057895a9c300e42478481c1d26  # v1.9.1
        with:
          scan-args: |-
            --sbom=sbom/sbom.cdx.json
            --format=sarif
            --output=osv-results.sarif
        continue-on-error: true   # don't fail CI before we upload results

      # ── Table output written to file so the severity step can parse it ──
      - name: Run OSV-Scanner (table to file)
        uses: google/osv-scanner-action/osv-scanner-action@daa2c68f50d845057895a9c300e42478481c1d26  # v1.9.1
        with:
          scan-args: |-
            --sbom=sbom/sbom.cdx.json
            --format=table
            --output=osv-table.txt
        continue-on-error: true

      # ── Severity-labeled table + hard fail on CRITICAL (CVSS >= 9.0) ──
      - name: OSV severity table + fail on CRITICAL (CVSS >= 9.0)
        if: always()
        run: |
          python3 << 'EOF'
          import re, sys

          THRESHOLDS = [(9.0, "CRITICAL"), (7.0, "HIGH"), (4.0, "MEDIUM"), (0.0, "LOW")]

          def label(score):
              for t, l in THRESHOLDS:
                  if score >= t:
                      return l
              return "UNKNOWN"

          try:
              content = open("osv-table.txt").read()
          except FileNotFoundError:
              print("osv-table.txt not found — skipping.")
              sys.exit(0)

          rows = []
          for line in content.splitlines():
              if not line.startswith("| https://osv.dev/"):
                  continue
              parts = [p.strip() for p in line.strip("|").split("|")]
              if len(parts) < 5:
                  continue
              url, score_str, _, package, version = parts[0], parts[1], parts[2], parts[3], parts[4]
              score = float(score_str) if score_str else 0.0
              rows.append((url, score, package, version))

          if not rows:
              print("No vulnerabilities found.")
              sys.exit(0)

          rows.sort(key=lambda x: x[1], reverse=True)

          w = (45, 6, 10, 52, 18)
          print(f"{'OSV URL':<{w[0]}} {'CVSS':>{w[1]}} {'SEVERITY':<{w[2]}} {'PACKAGE':<{w[3]}} {'VERSION'}")
          print("-" * sum(w + (4,)))
          for url, score, package, version in rows:
              print(f"{url:<{w[0]}} {f'{score:.1f}' if score else 'N/A':>{w[1]}} {label(score):<{w[2]}} {package:<{w[3]}} {version}")

          critical = [(url, score, pkg, ver) for url, score, pkg, ver in rows if score >= 9.0]
          print()
          if critical:
              print(f"::error::Found {len(critical)} CRITICAL vulnerability(ies) (CVSS >= 9.0) — build failed:")
              for url, score, pkg, ver in critical:
                  print(f"  ::error::{pkg} {ver} — {url} (CVSS {score:.1f})")
              sys.exit(1)
          else:
              print(f"No CRITICAL vulnerabilities (CVSS >= 9.0). {len(rows)} total finding(s) logged above.")
          EOF

      # ── Upload SARIF so findings appear in the Security tab ──
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      # ── Keep raw results as a downloadable artifact ──
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-osv-results
          path: osv-results.sarif
          retention-days: 90
