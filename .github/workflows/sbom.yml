name: SBOM & SCA - Software Composition Analysis

# Generates a CycloneDX SBOM with the CycloneDX Maven plugin, then scans the
# Maven dependency tree with Snyk Open Source (SCA). Snyk gives us CVE/CVSS-
# scored findings plus a hosted report (the "Snyk-rapport" audit appendix) and
# `snyk monitor` keeps that report in sync with every push to a tracked branch.
#
# SETUP (one-time, by the maintainer):
#   1. Sign in at https://snyk.io with GitHub and import the GrannyGuard org/repo.
#   2. Copy the API token from https://app.snyk.io/account.
#   3. Add it as repository secret SNYK_TOKEN (Settings > Secrets > Actions).

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: sbom-sca-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # upload SARIF to GitHub Security tab

jobs:
  sbom-sca:
    name: Generate SBOM & Scan for Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Pinned plugin version so the SBOM generator itself is reproducible
      # and not silently upgraded to an untrusted/newer release on every run.
      - name: Generate SBOM with CycloneDX Maven plugin
        run: mvn -B -ntp org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom -DoutputFormat=json

      - name: Move SBOM to docs/
        run: |
          mkdir -p docs/security/03-sbom-en-cve-advies sbom
          cp target/bom.json docs/security/03-sbom-en-cve-advies/sbom.cdx.json
          cp target/bom.json sbom/sbom.cdx.json

      # ── Upload as CI artifact ──
      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: docs/security/03-sbom-en-cve-advies/sbom.cdx.json
          retention-days: 90

      # ── Snyk Open Source: SCA scan of the Maven dependency tree ──
      - name: Set up Snyk CLI
        uses: snyk/actions/setup@9adf32b1121593767fc3c057af55b55db032dc04  # v1.0.0

      - name: Snyk test (SARIF + JSON for the steps below)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --file=pom.xml \
            --sarif-file-output=snyk-results.sarif \
            --json-file-output=snyk-results.json
        continue-on-error: true   # don't fail CI before we upload results

      # ── Snyk monitor: snapshots the dependency tree to app.snyk.io so the
      # hosted report (audit appendix) reflects the latest tracked-branch state ──
      - name: Snyk monitor (continuous dependency tracking)
        if: github.event_name == 'push'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk monitor --file=pom.xml --project-name=webservices-rest-audit
        continue-on-error: true

      # ── Severity-labeled table + hard fail on CRITICAL ──
      - name: Snyk severity table + fail on CRITICAL
        if: always()
        run: |
          python3 << 'EOF'
          import json, sys

          try:
              with open("snyk-results.json") as f:
                  data = json.load(f)
          except FileNotFoundError:
              print("snyk-results.json not found — skipping.")
              sys.exit(0)

          # `--json-file-output` writes a single result object for a plain
          # `--file=pom.xml` test, or a list of result objects under --all-projects.
          results = data if isinstance(data, list) else [data]
          rows = []
          for result in results:
              for vuln in result.get("vulnerabilities", []):
                  rows.append((
                      vuln.get("severity", "unknown").upper(),
                      vuln.get("cvssScore"),
                      vuln.get("id", ""),
                      vuln.get("packageName", ""),
                      vuln.get("version", ""),
                      vuln.get("title", ""),
                  ))

          if not rows:
              print("No vulnerabilities found.")
              sys.exit(0)

          order = {"CRITICAL": 0, "HIGH": 1, "MEDIUM": 2, "LOW": 3}
          rows.sort(key=lambda r: (order.get(r[0], 4), -(r[1] or 0)))

          w = (10, 6, 22, 40, 14, 50)
          print(f"{'SEVERITY':<{w[0]}} {'CVSS':>{w[1]}} {'SNYK ID':<{w[2]}} {'PACKAGE':<{w[3]}} {'VERSION':<{w[4]}} {'TITLE'}")
          print("-" * sum(w + (6,)))
          for sev, cvss, sid, pkg, ver, title in rows:
              cvss_str = f"{cvss:.1f}" if cvss else "N/A"
              print(f"{sev:<{w[0]}} {cvss_str:>{w[1]}} {sid:<{w[2]}} {pkg:<{w[3]}} {ver:<{w[4]}} {title[:w[5]]}")

          critical = [r for r in rows if r[0] == "CRITICAL"]
          print()
          if critical:
              print(f"::error::Found {len(critical)} CRITICAL vulnerability(ies) — build failed:")
              for sev, cvss, sid, pkg, ver, title in critical:
                  print(f"  ::error::{pkg} {ver} — {sid} (CVSS {cvss}) {title}")
              sys.exit(1)
          else:
              print(f"No CRITICAL vulnerabilities. {len(rows)} total finding(s) logged above.")
          EOF

      # ── Upload SARIF so findings appear in the Security tab ──
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: snyk-results.sarif
          category: snyk-open-source

      # ── Keep raw results as downloadable artifacts ──
      - name: Upload Snyk results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-snyk-results
          path: |
            snyk-results.sarif
            snyk-results.json
          retention-days: 90
