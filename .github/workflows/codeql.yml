name: "CodeQL (SAST)"

# NEN-7510 A.8.x — Static Application Security Testing of the OpenMRS REST module.
# Implements the SAST acceptance criteria defined in the non-functionals issue (#7).

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Weekly scan so newly-disclosed query packs catch existing code.
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write   # upload results to the Security tab
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ "java" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      # The module targets Java 8 (maven.compiler.target=1.8); build with a JDK 8 toolchain.
      - name: Set up JDK 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: "temurin"
          java-version: "8"
          cache: "maven"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      # Manual build so CodeQL traces the full multi-module compilation
      # (omod-common, omod, integration-tests). Tests are skipped for scan speed.
      - name: Build with Maven
        run: mvn -B -ntp clean install -DskipTests

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        with:
          category: "/language:${{ matrix.language }}"
