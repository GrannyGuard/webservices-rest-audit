name: "Release — build, sign & attest the .omod"

# NEN-7510 A.5.23 (supply chain security) / A.8.32 (change management) + CRA conformity.
# Hardening checklist §8 — "Signed artifacts". Builds the module, then produces a
# keyless (Sigstore/OIDC, no long-lived keys) cosign signature, a SLSA build-provenance
# attestation and a CycloneDX SBOM, and publishes all three alongside the .omod so
# downstream consumers can verify the artifact came unmodified from this pipeline.
#
# Triggered when a GitHub Release is published (assets are attached to that release) or
# manually (artifacts are produced for download).

on:
  release:
    types: [ published ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-sign-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-sign-attest:
    name: Build, sign & attest
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write       # attach signed assets to the GitHub Release
      id-token: write        # OIDC token for keyless cosign signing + provenance
      attestations: write    # write the build-provenance attestation

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      # The module targets Java 8 (maven.compiler.target=1.8); build with a JDK 8 toolchain.
      - name: Set up JDK 8
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          distribution: "temurin"
          java-version: "8"
          cache: "maven"

      - name: Build the module (.omod)
        run: mvn -B -ntp clean package -DskipTests

      # Pinned plugin version so the SBOM generator is reproducible (same as sbom.yml).
      - name: Generate CycloneDX SBOM
        run: mvn -B -ntp org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom -DoutputFormat=json

      - name: Locate build outputs
        id: artifacts
        run: |
          omod="$(ls omod/target/*.omod | head -n1)"
          echo "omod=${omod}" >> "$GITHUB_OUTPUT"
          echo "Built: ${omod}"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Keyless-sign the .omod with cosign
        env:
          OMOD: ${{ steps.artifacts.outputs.omod }}
        run: |
          cosign sign-blob --yes \
            --output-signature "${OMOD}.sig" \
            --output-certificate "${OMOD}.pem" \
            "${OMOD}"
          echo "Signature : ${OMOD}.sig"
          echo "Certificate: ${OMOD}.pem"

      # SLSA build provenance, signed keylessly via the same OIDC identity and recorded
      # in the GitHub attestations API (verifiable with `gh attestation verify <omod>`).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a  # v3
        with:
          subject-path: ${{ steps.artifacts.outputs.omod }}

      - name: Upload signed artifact bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: signed-omod
          path: |
            ${{ steps.artifacts.outputs.omod }}
            ${{ steps.artifacts.outputs.omod }}.sig
            ${{ steps.artifacts.outputs.omod }}.pem
            target/bom.json
          retention-days: 90

      # When this run was triggered by a published Release, attach the signed bundle to it.
      # Verify downstream with:
      #   cosign verify-blob --signature <omod>.sig --certificate <omod>.pem \
      #     --certificate-identity-regexp 'https://github.com/.*/release-sign.yml@.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <omod>
      - name: Attach signed assets to the Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OMOD: ${{ steps.artifacts.outputs.omod }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          cp target/bom.json "$(dirname "${OMOD}")/sbom.cdx.json"
          gh release upload "${TAG}" \
            "${OMOD}" "${OMOD}.sig" "${OMOD}.pem" \
            "$(dirname "${OMOD}")/sbom.cdx.json" \
            --clobber
