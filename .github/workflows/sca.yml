name: SCA - Software Composition Analysis

on:
  workflow_run:
    workflows: [ "Generate SBOM" ]
    types: [ completed ]
  workflow_dispatch:

jobs:
  sca:
    name: Scan SBOM for Vulnerabilities
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download the SBOM produced by the SBOM workflow ──
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom/
        # Falls back gracefully when triggered manually without a prior run
        continue-on-error: true

      # ── Fallback: regenerate SBOM if artifact is unavailable (manual trigger) ──
      - name: Set up Java (fallback)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate SBOM (fallback for manual trigger)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -DoutputFormat=json
          mkdir -p sbom
          cp target/bom.json sbom/sbom.cdx.json

      # ── OSV-Scanner: scans the CycloneDX SBOM against the OSV database ──
      - name: Run OSV-Scanner
        uses: google/osv-scanner-action@98b584ee2ed2da3935ccce10e06739d54cdcd20b  # v2.0.0
        with:
          scan-args: |-
            --sbom=sbom/sbom.cdx.json
            --format=sarif
            --output=osv-results.sarif
        continue-on-error: true   # don't fail CI before we upload results

      # ── Also produce a human-readable summary in the logs ──
      - name: OSV-Scanner summary (table)
        uses: google/osv-scanner-action@98b584ee2ed2da3935ccce10e06739d54cdcd20b  # v2.0.0
        with:
          scan-args: |-
            --sbom=sbom/sbom.cdx.json
            --format=table
        continue-on-error: true

      # ── Upload SARIF so findings appear in the Security tab ──
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      # ── Keep raw results as a downloadable artifact ──
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-osv-results
          path: osv-results.sarif
          retention-days: 90