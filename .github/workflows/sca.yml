name: SCA - Software Composition Analysis

on:
  workflow_run:
    workflows: [ "Generate SBOM" ]
    types: [ completed ]
  workflow_dispatch:

jobs:
  # ── Download/regenerate the SBOM and run OSV-Scanner manually ──
  sca:
    name: Scan SBOM for Vulnerabilities
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    permissions:
      security-events: write   # upload SARIF to GitHub Security tab
      contents: read
      actions: read            # needed to download artifacts from workflow_run

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Download the SBOM produced by the SBOM workflow ──
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom/
        continue-on-error: true

      # ── Fallback: regenerate SBOM if artifact is unavailable (manual trigger) ──
      - name: Set up Java (fallback)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate SBOM (fallback for manual trigger)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom -DoutputFormat=json
          mkdir -p sbom
          cp target/bom.json sbom/sbom.cdx.json

      # ── Install OSV-Scanner CLI directly ──
      - name: Install OSV-Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/download/v2.0.0/osv-scanner_linux_amd64 \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      # ── Scan the SBOM and produce SARIF output ──
      - name: Run OSV-Scanner (SARIF)
        run: |
          osv-scanner scan --sbom=sbom/sbom.cdx.json \
            --format=sarif \
            --output=osv-results.sarif
        continue-on-error: true

      # ── Human-readable summary in the logs ──
      - name: OSV-Scanner summary (table)
        run: |
          osv-scanner scan --sbom=sbom/sbom.cdx.json \
            --format=table
        continue-on-error: true

      # ── Upload SARIF so findings appear in the Security tab ──
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: osv-results.sarif
          category: osv-scanner

      # ── Keep raw results as a downloadable artifact ──
      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sca-osv-results
          path: osv-results.sarif
          retention-days: 90
