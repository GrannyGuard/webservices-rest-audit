version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    # Project is pinned to the Java 8 baseline (maven.compiler.target=1.8).
    # Ignore plugin versions that require Java 11+, so Dependabot cannot
    # re-break the build (a previous wave of these bumps broke main).
    ignore:
      - dependency-name: "com.mycila:license-maven-plugin"
        versions: [">=5.0.0"]    # 5.x requires Java 11
      - dependency-name: "org.apache.maven.plugins:maven-jar-plugin"
        versions: [">=4.0.0"]    # 4.x requires Java 17 / Maven 4
      - dependency-name: "org.apache.maven.plugins:maven-compiler-plugin"
        versions: [">=3.14.0"]   # newer releases lean Java 11+

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"