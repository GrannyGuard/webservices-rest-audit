# DEV override — local development.
# Ports exposed for convenience, locally built .omod hot-deployed, no auto-restart.
services:
  db:
    ports:
      - "3306:3306"          # exposed so you can inspect the DB with local tooling
    restart: "no"

  openmrs:
    ports:
      - "8080:8080"
    environment:
      OMRS_DEV_DEBUG: "true"
    # Hot-deploy locally built modules. The image WIPES /openmrs/data/modules on
    # every boot and repopulates it from /openmrs/distribution/openmrs_modules
    # (see startup-init.sh), so that distribution dir is the supported drop point —
    # NOT /openmrs/data/modules. Read-only is fine: the entrypoint only copies out of it.
    # Drop built .omod files into ./docker/dev/modules (see docker/dev/deploy-module.ps1).
    volumes:
      - ./docker/dev/modules:/openmrs/distribution/openmrs_modules:ro
    restart: "no"
